services:
  mysql:
    image: mysql:8.4
    container_name: lzf-studio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-lzf_studio}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  portfolio-backend:
    image: ${BACKEND_IMAGE:-lzf-studio-backend:latest}
    container_name: lzf-studio-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-lzf_studio}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      SERVER_PORT: 9090
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-9090}:9090"

  portfolio-frontend:
    image: ${FRONTEND_IMAGE:-lzf-studio-frontend:latest}
    container_name: lzf-studio-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: lzf-studio-nginx
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      FRONTEND_UPSTREAM: http://portfolio-frontend:80
      API_UPSTREAM: http://portfolio-backend:9090
      APP_CHAT_UPSTREAM: ${APP_CHAT_UPSTREAM:-http://host.docker.internal:3001}
      APP_ADMIN_UPSTREAM: ${APP_ADMIN_UPSTREAM:-http://host.docker.internal:8082}
      APP_AI_UPSTREAM: ${APP_AI_UPSTREAM:-http://host.docker.internal:5173}
    depends_on:
      portfolio-backend:
        condition: service_started
      portfolio-frontend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"

volumes:
  mysql-data:
