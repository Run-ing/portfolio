services:
  mysql:
    image: mysql:8.4
    container_name: lzf-studio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lzf_studio
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  portfolio-backend:
    build:
      context: ../portfolio-backend
    container_name: lzf-studio-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: lzf_studio
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9090:9090"

  portfolio-frontend:
    build:
      context: ../portfolio-frontend
    container_name: lzf-studio-frontend
    depends_on:
      - portfolio-backend
    ports:
      - "80:80"

volumes:
  mysql-data:
